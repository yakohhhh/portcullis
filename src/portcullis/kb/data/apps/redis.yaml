# Knowledge base entry — see src/portcullis/kb/__init__.py for the schema.
id: redis
name: Redis
category: database
sensitivity: high
images:
  - redis
  - library/redis
  - bitnami/redis
  - redis/redis-stack
  - redis/redis-stack-server
default_ports: [6379]
default_credentials: false
exposure: never
risk_note: >
  Redis ships with no password, so anyone who reaches port 6379 can read or
  wipe everything in it — often live session tokens and job queues. Worse,
  an unauthenticated attacker can usually turn that into full remote code
  execution by abusing CONFIG SET to write cron jobs or SSH keys to disk, or
  by loading a malicious Redis module.
references:
  - https://hub.docker.com/_/redis
  - https://redis.io/docs/latest/operate/oss_and_stack/management/security/
