# Knowledge base entry - see src/portcullis/kb/__init__.py for the schema.
id: mysql
name: MySQL
category: database
sensitivity: critical
images:
  - mysql
  - library/mysql
  - mysql/mysql-server
  - bitnami/mysql
default_ports: [3306, 33060]
default_credentials: false
exposure: never
risk_note: >
  MySQL usually stores the most valuable data on the box: user accounts,
  password hashes, orders, private content. An attacker who reaches port 3306
  can brute-force the root account and dump everything, and with the FILE
  privilege can write files on the server and escalate to code execution
  through rogue UDF plugins.
references:
  - https://hub.docker.com/_/mysql
  - https://dev.mysql.com/doc/refman/8.4/en/security-guidelines.html
