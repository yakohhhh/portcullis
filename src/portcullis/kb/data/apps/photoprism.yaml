# Knowledge base entry — see src/portcullis/kb/__init__.py for the schema.
id: photoprism
name: PhotoPrism
category: media
sensitivity: high
images:
  - photoprism/photoprism
  - photoprism
default_ports: [2342]
default_credentials: false
exposure: proxy-only
risk_note: >
  PhotoPrism indexes your personal photo library, including location metadata
  that shows where you live and travel. An attacker who reaches the web
  interface — or guesses a weak admin password like the "insecure"
  placeholder from the sample compose file — can browse and download every
  picture. Set a strong admin password and expose it only behind a reverse
  proxy with HTTPS.
references:
  - https://docs.photoprism.app/getting-started/docker-compose/
  - https://github.com/photoprism/photoprism
