# Knowledge base entry - see src/portcullis/kb/__init__.py for the schema.
id: wg-easy
name: wg-easy
category: vpn
sensitivity: critical
images:
  - wg-easy/wg-easy
  - weejewel/wg-easy
  - wg-easy
default_ports: [51820, 51821]
default_credentials: false
exposure: lan
risk_note: >
  The wg-easy web UI (port 51821) hands out complete WireGuard client
  configurations, private keys included. An attacker who reaches it - it runs
  without any password unless one is explicitly configured - downloads a
  profile and joins your private network as a trusted device. Only the
  WireGuard UDP port itself is safe to reach from outside; the admin UI
  belongs on the LAN or behind authenticated access, never proxied to the
  Internet.
references:
  - https://github.com/wg-easy/wg-easy
  - https://wg-easy.github.io/wg-easy/latest/
