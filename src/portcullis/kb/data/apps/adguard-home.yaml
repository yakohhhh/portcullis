# Knowledge base entry - see src/portcullis/kb/__init__.py for the schema.
id: adguard-home
name: AdGuard Home
category: dns
sensitivity: high
images:
  - adguard/adguardhome
  - adguardhome
default_ports: [53, 80, 443, 3000]
default_credentials: false
exposure: lan
risk_note: >
  AdGuard Home resolves DNS for your whole network: whoever controls it can
  redirect any website you visit to a fake copy and read the full browsing
  history of every device. Until the first-run wizard on port 3000 has been
  completed, anyone who reaches it can finish the setup and become admin.
  On the open Internet it is also abused as an open resolver for
  amplification attacks - keep it on the LAN or behind a VPN.
references:
  - https://github.com/AdguardTeam/AdGuardHome
  - https://github.com/AdguardTeam/AdGuardHome/wiki/Docker
