# Knowledge base entry — see src/portcullis/kb/__init__.py for the schema.
id: mariadb
name: MariaDB
category: database
sensitivity: critical
images:
  - mariadb
  - library/mariadb
  - bitnami/mariadb
  - linuxserver/mariadb
default_ports: [3306]
default_credentials: false
exposure: never
risk_note: >
  MariaDB is the primary datastore for many self-hosted apps (Nextcloud,
  WordPress, Home Assistant), so it holds their accounts and private data.
  An attacker who reaches port 3306 can brute-force root, dump every
  database, and — like MySQL — turn FILE privileges into code execution by
  dropping a malicious UDF plugin on the server.
references:
  - https://hub.docker.com/_/mariadb
  - https://mariadb.com/kb/en/securing-mariadb/
