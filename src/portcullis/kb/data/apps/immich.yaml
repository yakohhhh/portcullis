# Knowledge base entry - see src/portcullis/kb/__init__.py for the schema.
id: immich
name: Immich
category: media
sensitivity: high
images:
  - ghcr.io/immich-app/immich-server
  - immich-app/immich-server
  - immich-server
default_ports: [2283]
default_credentials: false
exposure: proxy-only
risk_note: >
  Immich stores your entire photo and video library along with face
  recognition data and GPS coordinates that map where you live, work and
  travel. Anyone who gets in can download the full library and reconstruct
  your daily movements from the metadata alone. Put it behind a reverse
  proxy with HTTPS and apply updates promptly - it is a fast-moving project.
references:
  - https://immich.app/docs/install/docker-compose
  - https://github.com/immich-app/immich
