# Knowledge base entry - see src/portcullis/kb/__init__.py for the schema.
id: traefik
name: Traefik
category: proxy
sensitivity: high
images:
  - traefik
  - library/traefik
default_ports: [80, 443, 8080]
default_credentials: false
exposure: public-ok
risk_note: >
  Traefik is the edge proxy that terminates TLS for everything behind it, so
  ports 80/443 are meant to face the Internet. The danger is its dashboard
  and API on port 8080: in the common `--api.insecure` setup they have no
  authentication and reveal every internal service, route and middleware -
  a ready-made map of your infrastructure for an attacker. Traefik also
  usually mounts the Docker socket, so treat the container itself as
  root-equivalent on the host.
references:
  - https://doc.traefik.io/traefik/operations/dashboard/
  - https://doc.traefik.io/traefik/setup/docker/
