# Knowledge base entry - see src/portcullis/kb/__init__.py for the schema.
id: nginx-proxy-manager
name: Nginx Proxy Manager
category: proxy
sensitivity: high
images:
  - jc21/nginx-proxy-manager
  - nginx-proxy-manager
default_ports: [80, 81, 443]
default_credentials: true
exposure: public-ok
risk_note: >
  Nginx Proxy Manager is your front door - it terminates TLS and routes
  traffic to every application behind it. Its admin panel on port 81 ships
  with the well-known login admin@example.com / changeme; an attacker who
  reaches it before you change that can reroute your domains, steal
  certificates and silently intercept every login that passes through.
  Ports 80/443 are meant for the Internet, port 81 never is.
references:
  - https://nginxproxymanager.com/setup/
  - https://nginxproxymanager.com/guide/
