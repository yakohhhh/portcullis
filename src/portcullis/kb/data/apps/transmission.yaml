# Knowledge base entry — see src/portcullis/kb/__init__.py for the schema.
id: transmission
name: Transmission
category: downloads
sensitivity: high
images:
  - linuxserver/transmission
  - haugene/transmission-openvpn
  - transmission
  - transmission-openvpn
default_ports: [9091, 51413]
default_credentials: true
exposure: lan
risk_note: >
  Many Transmission containers expose the web interface with no password at
  all, or with the well-known transmission/transmission login. An attacker
  who reaches it can reconfigure the daemon over its RPC interface —
  including the script that runs when a download finishes, which means
  running their own commands on your machine — and drop files into any
  folder the process can write. Keep the interface on the LAN and configure
  real credentials.
references:
  - https://github.com/transmission/transmission/blob/main/docs/Editing-Configuration-Files.md
  - https://docs.linuxserver.io/images/docker-transmission/
