# Knowledge base entry — see src/portcullis/kb/__init__.py for the schema.
id: gitea
name: Gitea
category: development
sensitivity: high
images:
  - gitea/gitea
  - gitea/gitea-rootless
  - gitea
default_ports: [3000, 22]
default_credentials: false
exposure: proxy-only
risk_note: >
  Gitea holds all your source code, including any API keys or passwords ever
  committed to a repository. An attacker who compromises an account — or who
  reaches an instance whose install wizard was never completed and creates
  the admin themselves — can read every repo, steal CI tokens and push
  malicious commits into your software.
references:
  - https://docs.gitea.com/installation/install-with-docker
  - https://docs.gitea.com/administration/https-setup
