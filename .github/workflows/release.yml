name: Release

# Cut a release by bumping the version in pyproject.toml, updating CHANGELOG.md,
# then pushing a matching tag: `git tag v0.1.0 && git push origin v0.1.0`.
# See RELEASING.md for the full checklist and the one-time PyPI setup.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag=$tag package version=$version"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag '$tag' does not match pyproject version '$version'." && exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*

      - name: Install smoke test (wheel installs and the CLI runs)
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/portcullis --version

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/portcullis
    permissions:
      id-token: write  # OIDC token for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract the changelog section for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then echo "See CHANGELOG.md." > release-notes.md; fi
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
