name: Release

# Cut a release by bumping the version in pyproject.toml, updating CHANGELOG.md,
# then pushing a matching tag: `git tag v0.1.0 && git push origin v0.1.0`.
# See RELEASING.md for the full checklist and the one-time PyPI setup.
#
# Security posture: least-privilege permissions per job, actions pinned by
# SHA, no persisted git credentials, PyPI trusted publishing (OIDC, no stored
# token), and signed build provenance attached to the artifacts.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write      # sign the provenance attestation
      attestations: write  # store it
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Check the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag=$tag package version=$version"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag '$tag' does not match pyproject version '$version'." && exit 1
          fi

      - name: Build sdist and wheel
        # The toolchain versions come from the "ci" extra in pyproject.toml,
        # pinned exactly and bumped only through reviewable Dependabot PRs -
        # the artifacts below get provenance-attested and published as-is.
        run: |
          python -m pip install -e ".[ci]"
          python -m build
          twine check dist/*

      - name: Install smoke test (wheel installs and the CLI runs)
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/portcullis --version

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/portcullis
    permissions:
      id-token: write  # OIDC token for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - name: Extract the changelog section for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then echo "See CHANGELOG.md." > release-notes.md; fi
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
