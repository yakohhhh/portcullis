# Continuous integration. Security posture (public repository):
# - least-privilege: contents:read at the workflow level, jobs never elevate
# - every third-party action is pinned to a commit SHA (dependabot keeps the
#   version comments fresh and bumps the pins)
# - checkout never persists credentials
# - untrusted expression values never reach `run:` directly (env indirection)
# See docs/ci.md for the full pipeline overview.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests

  workflow-security:
    # zizmor audits our own workflows and action.yml for the classic GitHub
    # Actions foot-guns (template injection, credential persistence,
    # unpinned or impostor actions). A security tool should pass its own bar.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install zizmor (pinned via the "ci" extra)
        run: pip install -e ".[ci]"
      - name: Audit workflows and the composite action
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zizmor --min-severity medium .github/workflows action.yml

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Full Python range on Linux (the primary target); latest Python only
        # on macOS and Windows, which is enough to catch platform breakage.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Pytest with coverage gate
        run: pytest --cov=portcullis --cov-report=term --cov-report=xml --cov-fail-under=88
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.xml

  # Dogfood the composite action against the deliberately vulnerable demo
  # stack. The stack is meant to fail, so the gate is disabled (fail-on: never)
  # and the run documents the findings in the job summary instead.
  demo-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan the demo stack with the Portcullis action
        id: portcullis
        uses: ./
        with:
          path: examples/demo-stack
          fail-on: never
      - name: Show the action outputs
        env:
          GRADE: ${{ steps.portcullis.outputs.grade }}
          SCORE: ${{ steps.portcullis.outputs.score }}
        run: echo "grade=$GRADE score=$SCORE"
      - name: Upload the report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: portcullis-report
          path: |
            portcullis-report.md
            portcullis-report.json

  # Aggregate gate: the one required status check for branch protection.
  # Requiring this single job keeps the protection rule stable when the
  # matrix above changes.
  ci-ok:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, workflow-security, test, coverage, demo-scan]
    if: always()
    steps:
      - name: Fail if any dependency failed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "job results: $RESULTS"
          for result in $RESULTS; do
            if [ "$result" != "success" ]; then
              echo "::error::A required job finished with result '$result'."
              exit 1
            fi
          done
