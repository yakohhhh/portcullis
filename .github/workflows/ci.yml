name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest

  demo-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: pip install .
      - name: Scan the demo stack (markdown report)
        # The demo stack is deliberately vulnerable: the scan documents its
        # findings but must never fail the job, so we do not gate on it.
        run: portcullis scan examples/demo-stack --format markdown --no-trivy -o portcullis-report.md
      - name: Scan the demo stack (human-readable log)
        run: portcullis scan examples/demo-stack --no-trivy
      - name: Upload markdown report
        uses: actions/upload-artifact@v4
        with:
          name: portcullis-report
          path: portcullis-report.md
