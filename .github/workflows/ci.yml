name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python range on Linux (the primary target); latest Python only
        # on macOS and Windows, which is enough to catch platform breakage.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest

  # Dogfood the composite action against the deliberately vulnerable demo
  # stack. The stack is meant to fail, so the gate is disabled (fail-on: never)
  # and the run documents the findings in the job summary instead.
  demo-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Scan the demo stack with the Portcullis action
        id: portcullis
        uses: ./
        with:
          path: examples/demo-stack
          fail-on: never
      - name: Show the action outputs
        run: echo "grade=${{ steps.portcullis.outputs.grade }} score=${{ steps.portcullis.outputs.score }}"
      - name: Upload the report
        uses: actions/upload-artifact@v4
        with:
          name: portcullis-report
          path: |
            portcullis-report.md
            portcullis-report.json
