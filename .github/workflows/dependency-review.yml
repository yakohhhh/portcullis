name: Dependency review

# Blocks pull requests that introduce dependencies with known vulnerabilities.
# The action compares manifests through the Dependency Graph API, so it needs
# no checkout and no write permission; failures surface as the failing check
# and its job summary (a PR comment would not work for fork PRs anyway, whose
# GITHUB_TOKEN is always read-only on a public repository).
on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
