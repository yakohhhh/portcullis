name: Scorecard

# OpenSSF Scorecard: continuously rates this repository's supply-chain
# security posture (pinned dependencies, token permissions, branch
# protection, ...). Results are published (badge in the README) and uploaded
# to the Security tab.
on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "30 2 * * 1" # weekly, Monday morning

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload the SARIF results
      id-token: write        # publish the results for the badge
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload the SARIF results artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 7
      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          sarif_file: results.sarif
