name: Scorecard

# OpenSSF Scorecard: continuously rates this repository's supply-chain
# security posture (pinned dependencies, token permissions, branch
# protection, ...). Results are published (badge in the README) and uploaded
# to the Security tab.
on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "30 2 * * 1" # weekly, Monday morning

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload the SARIF results
      id-token: write        # publish the results for the badge
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload the SARIF results artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 7
      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
